# Flow 05-Editor-Generate. Editor with workspace=Generate, chat closed.
# documentId is opaque ('mock-doc-1' is a placeholder; route accepts any
# non-empty string).
appId: art.suquia.diffusecraft
---
- launchApp:
    arguments:
      url: "diffusecraft://__debug?cycle_to=connected"
- waitForAnimationToEnd:
    timeout: 1500
- launchApp:
    arguments:
      url: "diffusecraft://editor/mock-doc-1?workspace=generate"
- waitForAnimationToEnd:
    timeout: 1200
- takeScreenshot: ../captures/05-Editor-Generate/_latest
