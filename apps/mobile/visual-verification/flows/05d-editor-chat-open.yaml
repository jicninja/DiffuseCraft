# Flow 05d-Editor-Chat-Open. Editor with workspace=Generate (default), chat
# panel open via the ?chat=true query param (post-expo-router migration the
# old /chat path-suffix has been replaced).
appId: art.suquia.diffusecraft
---
- launchApp:
    arguments:
      url: "diffusecraft://__debug?cycle_to=connected"
- waitForAnimationToEnd:
    timeout: 1500
- launchApp:
    arguments:
      url: "diffusecraft://editor/mock-doc-1?chat=true"
- waitForAnimationToEnd:
    timeout: 1200
- takeScreenshot: ../captures/05d-Editor-Chat-Open/_latest
