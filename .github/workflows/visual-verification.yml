name: visual-verification
# Informative-only screenshot-diff pipeline. Never fails the build on diff
# outcomes (FR-6). Linux runner; iOS would force macOS (~10x cost).

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'libs/ui/**'
      - 'apps/mobile/design-snapshot/**'
      - 'apps/mobile/visual-verification/**'
      - 'tailwind.config.js'
      - 'package.json'
  push:
    branches: [main]

jobs:
  verify:
    name: visual-verification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Pinned: Pixel Tablet API 34 google_apis x86_64. Determinism — NFR-2.
      - name: Boot Android emulator + run pipeline
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_tablet
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            cd apps/mobile
            pnpm prebuild --platform android --no-install
            pnpm exec expo run:android --device emulator
            cd ../..
            pnpm verify:visual --ci

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-verification-${{ github.run_id }}
          path: apps/mobile/visual-verification/report/

      # Soft PR comment with artifact link. Always posts (informative-only).
      - name: Comment on PR with artifact link
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Visual verification artifact: [download \`visual-verification-${context.runId}\`](${url}) — informative; non-gating in v1.`
            });
